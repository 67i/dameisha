    <div class="lightbox" id="lightbox">

    <script src="./js/i18n.js"></script>
    <script>
    (function() {
        var galleryImages = [];
        var currentIndex = 0;

        function getExchangeType() {
            var params = new URLSearchParams(window.location.search);
            return params.get('type') || 'manhattan-club';
        }

        function getCurrentLang() {
            if (typeof I18n !== 'undefined' && I18n.currentLang) {
                return I18n.currentLang;
            }
            return 'zh';
        }

        function loadExchangeDetail() {
            fetch('./data/exchange-details.json?t=' + Date.now())
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    var type = getExchangeType();
                    var exchange = data[type];
                    if (!exchange) {
                        exchange = data['manhattan-club'];
                    }
                    renderExchangeDetail(exchange);
                })
                .catch(function(error) {
                    console.error('Failed to load exchange detail:', error);
                });
        }

        function renderExchangeDetail(exchange) {
            var lang = getCurrentLang();
            var i18n = exchange.i18n && exchange.i18n[lang] ? exchange.i18n[lang] : exchange.i18n && exchange.i18n['zh'] ? exchange.i18n['zh'] : {};

            var introTextHtml = '';
            if (i18n.introP1) {
                introTextHtml += '<p class="hotel-intro-p">' + i18n.introP1 + '</p>';
            }
            if (i18n.introP2) {
                introTextHtml += '<p class="hotel-intro-p">' + i18n.introP2 + '</p>';
            }
            document.getElementById('introText').innerHTML = introTextHtml;

            if (exchange.gallery && exchange.gallery.length > 0) {
                document.getElementById('introImage').src = exchange.gallery[0];
            }

            document.getElementById('galleryTitle').textContent = i18n.title || '';

            galleryImages = exchange.gallery || [];
            var galleryHtml = '';
            if (galleryImages.length > 0) {
                galleryImages.forEach(function(img, index) {
                    galleryHtml += '<div class="exchange-gallery-item">' +
                        '<img src="' + img + '" alt="" class="exchange-gallery-img" data-index="' + index + '">' +
                        '</div>';
                });
            }
            document.getElementById('exchangeGallery').innerHTML = galleryHtml;

            initLightbox();

            var siteName = lang === 'zh' ? '换享星球' : lang === 'en' ? 'Huanxiang Planet' : lang === 'ko' ? '환상 행성' : 'ファンタジープラネット';
            document.title = (i18n.title || '') + ' - ' + siteName;
        }

        function initLightbox() {
            var lightbox = document.getElementById('lightbox');
            var lightboxImg = document.getElementById('lightboxImg');
            var lightboxClose = document.getElementById('lightboxClose');
            var lightboxPrev = document.getElementById('lightboxPrev');
            var lightboxNext = document.getElementById('lightboxNext');
            var lightboxCounter = document.getElementById('lightboxCounter');
            var galleryImgs = document.querySelectorAll('.exchange-gallery-img');

            var introImage = document.getElementById('introImage');
            if (introImage && galleryImages.length > 0) {
                introImage.style.cursor = 'pointer';
                introImage.addEventListener('click', function() {
                    currentIndex = 0;
                    openLightbox();
                });
            }

            galleryImgs.forEach(function(img) {
                img.style.cursor = 'pointer';
                img.addEventListener('click', function() {
                    currentIndex = parseInt(this.getAttribute('data-index'));
                    openLightbox();
                });
            });

            function openLightbox() {
                lightbox.classList.add('active');
                lightboxImg.src = galleryImages[currentIndex];
                updateCounter();
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            }

            function showPrev() {
                currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
                lightboxImg.src = galleryImages[currentIndex];
                updateCounter();
            }

            function showNext() {
                currentIndex = (currentIndex + 1) % galleryImages.length;
                lightboxImg.src = galleryImages[currentIndex];
                updateCounter();
            }

            function updateCounter() {
                lightboxCounter.textContent = (currentIndex + 1) + ' / ' + galleryImages.length;
            }

            lightboxClose.addEventListener('click', closeLightbox);
            lightboxPrev.addEventListener('click', showPrev);
            lightboxNext.addEventListener('click', showNext);

            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });

            document.addEventListener('keydown', function(e) {
                if (!lightbox.classList.contains('active')) return;
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') showPrev();
                if (e.key === 'ArrowRight') showNext();
            });
        }

        function tryLoad() {
            if (typeof I18n !== 'undefined' && I18n.translations && Object.keys(I18n.translations).length > 0) {
                loadExchangeDetail();
            } else {
                setTimeout(tryLoad, 50);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', tryLoad);
        } else {
            tryLoad();
        }

        document.addEventListener('languageChanged', loadExchangeDetail);
    })();
    </script>
