AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: qx serverless api

Conditions:
  UseIamDbAuth: !Equals [!Ref DbUseIamAuth, "true"]
  UseVpcConfig: !Not [!Equals [!Join ["", !Ref VpcSubnetIds], ""]]

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 512
    Handler: handler.handler
    Environment:
      Variables:
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        COGNITO_CLIENT_ID: !Ref CognitoClientId
        DB_HOST: !Ref DbHost
        DB_PORT: !Ref DbPort
        DB_USER: !Ref DbUser
        DB_PASSWORD: !Ref DbPassword
        DB_NAME: !Ref DbName
        DB_USE_IAM_AUTH: !Ref DbUseIamAuth

Parameters:
  CognitoUserPoolId:
    Type: String
  CognitoClientId:
    Type: String
  DbHost:
    Type: String
  DbPort:
    Type: String
    Default: "5432"
  DbUser:
    Type: String
  DbPassword:
    Type: String
    NoEcho: true
    Default: ""
  DbName:
    Type: String
    Default: postgres
  DbUseIamAuth:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  DbResourceId:
    Type: String
    Default: ""
    Description: RDS DB resource ID for IAM DB auth, such as cluster-ABCDEFGHIJKL
  VpcSubnetIds:
    Type: CommaDelimitedList
    Default: ""
    Description: Optional private subnet IDs that can reach the Aurora PostgreSQL cluster
  VpcSecurityGroupIds:
    Type: CommaDelimitedList
    Default: ""
    Description: Optional security group IDs for the API Lambda

Resources:
  QxApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowMethods:
          - GET
          - POST
          - PATCH
          - OPTIONS
        AllowOrigins:
          - "*"

  QxApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handler.ts
        Format: cjs
        Minify: false
        Sourcemap: false
        Target: es2022
    Properties:
      CodeUri: .
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - !If
          - UseIamDbAuth
          - Statement:
              - Effect: Allow
                Action:
                  - rds-db:connect
                Resource: !Sub "arn:${AWS::Partition}:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:${DbResourceId}/${DbUser}"
          - !Ref AWS::NoValue
      VpcConfig: !If
        - UseVpcConfig
        - SubnetIds: !Ref VpcSubnetIds
          SecurityGroupIds: !Ref VpcSecurityGroupIds
        - !Ref AWS::NoValue
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref QxApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref QxApi
            Path: /
            Method: ANY

Outputs:
  ApiEndpoint:
    Description: API endpoint
    Value: !Sub "https://${QxApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
