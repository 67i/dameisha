<section class="admin-page">
    <aside class="admin-sidebar">
        <div class="admin-brand">
            <span class="material-symbols-outlined">admin_panel_settings</span>
            <div>
                <strong>QX Admin</strong>
                <span>运营管理后台</span>
            </div>
        </div>
        <nav class="admin-nav" aria-label="后台导航">
            <button class="admin-nav-btn active" data-admin-view="dashboard" type="button">
                <span class="material-symbols-outlined">dashboard</span>
                <span>数据看板</span>
            </button>
            <button class="admin-nav-btn" data-admin-view="orders" type="button">
                <span class="material-symbols-outlined">receipt_long</span>
                <span>订单管理</span>
            </button>
            <button class="admin-nav-btn" data-admin-view="intents" type="button">
                <span class="material-symbols-outlined">shopping_cart</span>
                <span>购买意向</span>
            </button>
            <button class="admin-nav-btn" data-admin-view="users" type="button">
                <span class="material-symbols-outlined">group</span>
                <span>用户管理</span>
            </button>
            <button class="admin-nav-btn" data-admin-view="audit" type="button">
                <span class="material-symbols-outlined">manage_search</span>
                <span>审计日志</span>
            </button>
        </nav>
    </aside>

    <div class="admin-main">
        <header class="admin-topbar">
            <div>
                <h1>后台管理系统</h1>
                <p id="adminStatusText">请登录管理员账号。</p>
            </div>
            <div class="admin-actions">
                <button class="admin-icon-btn" id="adminRefreshBtn" type="button" aria-label="刷新">
                    <span class="material-symbols-outlined">refresh</span>
                </button>
                <button class="admin-logout-btn" id="adminLogoutBtn" type="button">退出登录</button>
            </div>
        </header>

        <section class="admin-login-panel" id="adminLoginPanel">
            <form class="admin-login-form" id="adminLoginForm">
                <div class="admin-login-field">
                    <label for="adminUsernameInput">管理员用户名</label>
                    <input id="adminUsernameInput" type="text" autocomplete="username" placeholder="例如 admin001">
                </div>
                <div class="admin-login-field">
                    <label for="adminPasswordInput">密码</label>
                    <input id="adminPasswordInput" type="password" autocomplete="current-password" placeholder="输入管理员密码">
                </div>
                <button id="adminLoginBtn" type="submit">登录</button>
            </form>
        </section>

        <section class="admin-alert" id="adminAlert" style="display:none;"></section>

        <section class="admin-view active" id="adminViewDashboard">
            <div class="admin-metrics" id="adminMetrics"></div>
            <div class="admin-section">
                <div class="admin-section-header">
                    <h2>订单状态</h2>
                </div>
                <div class="admin-status-list" id="adminStatusList"></div>
            </div>
            <div class="admin-section">
                <div class="admin-section-header">
                    <h2>近 7 天趋势</h2>
                </div>
                <div class="admin-trend" id="adminTrend"></div>
            </div>
        </section>

        <section class="admin-view" id="adminViewOrders">
            <div class="admin-section">
                <div class="admin-section-header">
                    <h2>订单管理</h2>
                    <span id="adminOrdersMeta"></span>
                </div>
                <div class="admin-table-wrap">
                    <table class="admin-table" id="adminOrdersTable"></table>
                </div>
                <div class="admin-detail-panel" id="adminOrderDetailPanel" style="display:none;">
                    <div class="admin-detail-header">
                        <h3>订单详情</h3>
                        <button class="admin-icon-btn" id="adminCloseOrderDetailBtn" type="button" aria-label="关闭订单详情">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </div>
                    <div class="admin-detail-grid" id="adminOrderDetail"></div>
                    <div class="admin-status-editor">
                        <label for="adminOrderStatusSelect">订单状态</label>
                        <select id="adminOrderStatusSelect">
                            <option value="cooling_period">冷静期</option>
                            <option value="active">激活中</option>
                            <option value="completed">已完成</option>
                            <option value="refunded">已退款</option>
                        </select>
                        <button id="adminUpdateOrderStatusBtn" type="button">保存状态</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="admin-view" id="adminViewIntents">
            <div class="admin-section">
                <div class="admin-section-header">
                    <h2>购买意向</h2>
                    <span id="adminIntentsMeta"></span>
                </div>
                <div class="admin-table-wrap">
                    <table class="admin-table" id="adminIntentsTable"></table>
                </div>
            </div>
        </section>

        <section class="admin-view" id="adminViewUsers">
            <div class="admin-section">
                <div class="admin-section-header">
                    <h2>用户管理</h2>
                    <span id="adminUsersMeta"></span>
                </div>
                <div class="admin-table-wrap">
                    <table class="admin-table" id="adminUsersTable"></table>
                </div>
            </div>
        </section>

        <section class="admin-view" id="adminViewAudit">
            <div class="admin-section">
                <div class="admin-section-header">
                    <h2>审计日志</h2>
                    <span id="adminAuditMeta"></span>
                </div>
                <div class="admin-table-wrap">
                    <table class="admin-table" id="adminAuditTable"></table>
                </div>
            </div>
        </section>
    </div>
</section>
